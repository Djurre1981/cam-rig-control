# Copy to config.yaml and edit paths
serial:
  mega_port: /dev/ttyACM0   # Windows: COM3
  baud: 115200

motion:
  command_hz: 50
  axis_names: [boom, swing, yaw, pitch]

camera:
  enabled: true
  # Sony ZV-1 II via Camera Remote Command (PTP)
  backend: stub   # stub | ptp (implement ptp when SDK integrated)

api:
  host: 0.0.0.0
  port: 8080

presets:
  directory: ./presets
